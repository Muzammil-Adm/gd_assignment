name: CI - K8s + Terraform Validation
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Fixed: no citation

    - name: Install kubeval
      run: |
        curl -sSLO "https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz"
        tar xzf kubeval-linux-amd64.tar.gz
        sudo mv kubeval /usr/local/bin/

    - name: Validate K8s manifests
      run: |
        find k8s-specifications -name "*.yaml" -exec kubeval {} \;

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.5

    - name: Terraform validate
      run: |
        cd terraform/aws-eks || echo "Terraform dir missing"
        terraform init -backend=false
        terraform fmt -check
        terraform validate

